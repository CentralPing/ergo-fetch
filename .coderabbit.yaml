chat:
  auto_reply: true

knowledge_base:
  learnings:
    scope: auto
  issues:
    scope: auto
  pull_requests:
    scope: auto
  web_search:
    enabled: true
  code_guidelines:
    enabled: true
  linked_repositories:
    - repository: "CentralPing/ergo-router"
      instructions: >
        REST-compliant router that ergo-fetch is designed to interact with.
        ergo-fetch implements client-side counterparts to ergo-router's
        transport concerns (rate limiting, CORS, request IDs, CSRF) and
        pipeline features (conditional requests, pagination, Prefer header).
    - repository: "CentralPing/ergo"
      instructions: >
        Core middleware toolkit. ergo-fetch interacts with ergo's response
        conventions (RFC 9457 Problem Details, ETag generation, Link headers,
        X-RateLimit-* headers, Prefer header semantics).
    - repository: "CentralPing/centralping.github.io"
      instructions: >
        Project documentation website. API reference and guides for
        ergo-fetch will be published here alongside ergo and ergo-router docs.
